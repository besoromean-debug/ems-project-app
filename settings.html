<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS - Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        html, body { height: 100%; margin: 0; background-color: #f8f9fa !important; color: #333; font-family: 'Segoe UI', sans-serif; }
        .sidebar { min-height: 100vh; background-color: #2c3e50 !important; color: #ffffff !important; }
        .nav-link { color: rgba(255,255,255,0.7) !important; transition: all 0.3s ease; }
        .nav-link:hover { color: #ffffff !important; background: rgba(255, 255, 255, 0.1); border-radius: 5px; }
        .nav-link.active { color: white !important; background: #3b82f6 !important; border-radius: 5px; }
        .card { border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075) !important; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar p-3">
                <h4 class="text-center mb-4">EMS Admin</h4>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/employees"><i class="bi bi-people me-2"></i> Employees</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/settings"><i class="bi bi-gear me-2"></i> Settings</a></li>
                    <hr>
                    <li class="nav-item"><a class="nav-link text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                </ul>
            </nav>

            <main class="col-md-10 ms-sm-auto p-4">
                <div class="pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Account Settings</h1>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card p-4 border-0 shadow-sm">
                            <h5 class="mb-4"><i class="bi bi-shield-lock me-2"></i> Change Password</h5>
                            <form id="changePasswordForm">
                                <div class="mb-3">
                                    <label class="form-label">Current Password</label>
                                    <input type="password" id="currentPassword" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">New Password</label>
                                    <input type="password" id="newPassword" class="form-control" required minlength="6">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">Confirm New Password</label>
                                    <input type="password" id="confirmPassword" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Update Password</button>
                            </form>
                            <div id="messageArea" class="mt-3 d-none"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-4 border-0 shadow-sm">
                            <h5><i class="bi bi-info-circle me-2"></i> System Info</h5>
                            <p class="text-secondary mt-3">You are logged in as an administrator. Changing your password will affect your next login session.</p>
                            <hr>
                            <p class="small mb-1"><strong>Database:</strong> SQLite (ems.db)</p>
                            <p class="small mb-1"><strong>Server Status:</strong> <span class="text-success fw-bold">Online</span></p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgArea = document.getElementById('messageArea');

            if (newPassword !== confirmPassword) {
                msgArea.className = 'mt-3 alert alert-danger';
                msgArea.innerText = 'Hindi magkatugma ang new password at confirmation.';
                msgArea.classList.remove('d-none');
                return;
            }

            try {
                const res = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                const data = await res.json();

                if (res.ok) {
                    msgArea.className = 'mt-3 alert alert-success';
                    msgArea.innerText = data.message;
                    e.target.reset();
                } else {
                    msgArea.className = 'mt-3 alert alert-danger';
                    msgArea.innerText = data.error || 'May problema sa pag-update.';
                }
                msgArea.classList.remove('d-none');
            } catch (err) {
                msgArea.className = 'mt-3 alert alert-danger';
                msgArea.innerText = 'May error sa server.';
                msgArea.classList.remove('d-none');
            }
            
            // Hide message after 5 seconds
            setTimeout(() => msgArea.classList.add('d-none'), 5000);
        });
    </script>
</body>
</html>
