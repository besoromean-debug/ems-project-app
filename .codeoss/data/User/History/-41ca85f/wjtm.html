<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <title>Employee Management - Login</title>
    <style>
      /* Pangkalahatang Reset para malinis ang spacing */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background-color: #f4f7f6;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* Wrapper o Lalagyan ng Form */
.form-container {
  background-color: #ffffff;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
  width: 100%;
  max-width: 450px;
}

/* Pamagat ng Form */
.form-container h2 {
  margin-bottom: 20px;
  color: #333333;
  font-size: 24px;
  text-align: center;
}

/* Grouping para sa bawat Input at Label */
.form-group {
  margin-bottom: 20px;
}

/* Ayos ng mga Label */
.form-group label {
  display: block;
  margin-bottom: 8px;
  color: #666666;
  font-size: 14px;
  font-weight: 600;
}

/* Estilo ng mga Input Fields, Select, at Textarea */
.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="password"],
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #cccccc;
  border-radius: 6px;
  font-size: 15px;
  color: #333333;
  outline: none;
  transition: all 0.3s ease;
}

/* Textarea height block */
.form-group textarea {
  resize: vertical;
  min-height: 100px;
}

/* Kapag kini-click o pino-focus ang input */
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: #4a90e2;
  box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
}

/* Estilo para sa Submit Button */
.submit-btn {
  width: 100%;
  padding: 14px;
  background-color: #4a90e2;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background-color 0.2s ease, transform 0.1s ease;
}

/* Hover at Active Effects ng Button */
.submit-btn:hover {
  background-color: #357abd;
}

.submit-btn:active {
  transform: scale(0.98);
}
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%) fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .login-card {
            background: #ffffff;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.175);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .card-title {
            font-weight: 800;
            letter-spacing: 2px;
            color: #1e3c72;
        }
        .form-control-lg {
            font-size: 1rem;
        }
        .btn-login {
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background-color: #0d6efd;
            border: none;
            padding: 0.75rem;
        }
        .btn-login:hover {
            background-color: #0b5ed7;
        }
        .input-group-text {
            background-color: #ffffff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <h4 class="text-center mb-4 card-title text-uppercase">Admin Login</h4>
        <h3 class="text-center mb-4 card-title text-uppercase">Admin Login</h3>
        
        <!-- Alert Message -->
        <div id="errorAlert" class="alert alert-danger d-none py-2 small text-center mb-3"></div>
        
        <form action="/login" method="POST">
            <!-- Username -->
            <div class="mb-3">
                <label class="form-label small fw-bold"><i class="bi bi-person-fill"></i> Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
            </div>
            
            <!-- Password -->
            <div class="mb-4">
                <label class="form-label small fw-bold"><i class="bi bi-lock-fill"></i> Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="passwordInput" class="form-control form-control-lg" placeholder="Enter password" required>
                    <span class="input-group-text" id="togglePassword">
                        <i class="bi bi-eye-slash" id="toggleIcon"></i>
                    </span>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 btn-login py-2">
                Login <i class="bi bi-box-arrow-in-right ms-1"></i>
            </button>
        </form>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Error Alert Logic
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                const alertBox = document.getElementById('errorAlert');
                alertBox.textContent = decodeURIComponent(error);
                alertBox.classList.remove('d-none');
            }

            // Show/Hide Password Logic
            const togglePassword = document.querySelector('#togglePassword');
            const passwordInput = document.querySelector('#passwordInput');
            const toggleIcon = document.querySelector('#toggleIcon');

            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Toggle icons
                toggleIcon.classList.toggle('bi-eye');
                toggleIcon.classList.toggle('bi-eye-slash');
            });
        });
    </script>
</body>
</html>
