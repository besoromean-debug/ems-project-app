<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="home">
        <h2>Select Option</h2>
        
        <div class="container-grid">
            <a href="print_process.html" class="glass-card">
                <img src="https://cdn-icons-png.flaticon.com/512/446/446991.png" alt="print">
                <span>Print File</span>
            </a>

            <a href="print_process.html" class="glass-card">
                <img src="https://static.thenounproject.com/png/78292-200.png" alt="price">
                <span>Pricing</span>
            </a>

            <a href="print_process.html" class="glass-card">
                <img src="https://cdn-icons-png.flaticon.com/512/5229/5229448.png" alt="works">
                <span>How it works</span>
            </a>

            <a href="print_process.html" class="glass-card">
                <img src="https://cdn-icons-png.flaticon.com/512/471/471663.png" alt="about">
                <span>About</span>
            </a>
        </div>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #home {
            height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        #home h2 {
            font-size: 60px;
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 60px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .container-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px;
        }

        .glass-card {
            width: 600px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            gap: 25px; /* Agwat sa pagitan ng icon at text */
            
            /* Initial State */
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        /* Icon Style */
        .glass-card img {
            width: 80px; /* Laki ng icon */
            height: 80px;
            object-fit: contain;
            z-index: 2;
            transition: transform 0.4s ease;
        }

        /* Hover Effect */
        .glass-card:hover {
            background: white; 
            transform: translateY(-10px);
            border: 1px solid rgba(148, 144, 144, 0.8);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
        }

        .glass-card:hover img {
            transform: scale(1.1); /* Konting laki ng icon pag hover */
        }

        .glass-card span {
            color: rgb(46, 43, 43); 
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .glass-card:hover span {
            color: black; 
            transform: scale(1.05);
            text-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        /* Shine effect */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .glass-card:hover::before {
            left: 100%;
        }


    </style>

    <script>
        let timeout;

        function resetTimer() {
            // I-clear ang lumang timer tuwing may activity
            clearTimeout(timeout);
            
            // Pagkalipas ng 30000 milliseconds (30 seconds), babalik sa index
            timeout = setTimeout(() => {
                window.location.href = "/";
            }, 30000); 
        }

        // Makikinig tayo sa mga events gaya ng click, galaw ng mouse, o pindot sa keyboard
        const events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'];
        
        events.forEach(name => {
            document.addEventListener(name, resetTimer, true);
        });

        // Simulan ang countdown pagka-load ng page
        resetTimer();
    </script>
</body>
</html>
