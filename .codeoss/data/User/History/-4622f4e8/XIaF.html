<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .container h1 {
            font-size: 100px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .container p {
            font-size: 24px;
            margin-bottom: 40px;
            color: #bdc1c6;
        }

        .button-start {
            padding: 20px 60px;
            background-color: #FFFFFF;
            color: #203a43;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.5rem;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .button-start:hover {
            background-color: #FFC229;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello User!</h1>
        <p>Ready to print? Let's get your files ready.</p>
        <a href="print_process.html" class="button-start">Get Started</a>
    </div>
</body>
</html>
