<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="back-nav">
        <a href="home.html" class="back-button">Back</a>
    </div>

    <div id="print">
        <div class="stepper-wrapper">
            <a href="print_process.html" class="step-link">
                <div class="stepper-item active">
                    <div class="step-counter">1</div>
                    <div class="step-name">Upload</div>
                </div>
            </a>
            <a href="process.html" class="step-link">
                <div class="stepper-item">
                    <div class="step-counter">2</div>
                    <div class="step-name">Process</div>
                </div>
            </a>
            <a href="review.html" class="step-link">
                <div class="stepper-item">
                    <div class="step-counter">3</div>
                    <div class="step-name">Review</div>
                </div>
            </a>
            <a href="print.html" class="step-link">
                <div class="stepper-item">
                    <div class="step-counter">4</div>
                    <div class="step-name">Print</div>
                </div>
            </a>
        </div>

        <div class="upload-content">
            <div class="qr-section">
                <h3>Scan to Upload</h3>
                <img id="qrCode" src="" alt="QR Code">
                <p>Scan this QR code with your phone to select and upload your files.</p>
            </div>

            <div class="status-section">
                <div class="loader"></div>
                <p>Waiting for file...</p>
            </div>
        </div>
    </div>

    <script>
        //  sessionId = Math.random().toString(36).substring(2, 10);
        }

        const uploadUrl = `${window.location.origin}/upload.html?sessionId=${sessionId}`;
        document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(uploadUrl)}`;

        // Function para i-poll ang server kung may file na
        async function checkUploadStatus() {
            try {
                const response = await fetch(`/check-status/${sessionId}`);
                const data = await response.json();
                
                if (data.uploaded) {at na sa Step 2
                    window.location.href = `process.html?sessionId=${sessionId}`;
                }
            } catch (error) {
                console.error('Error checking status:', erro
        }

        // Mag-check bawat 2 segundo
        setInterval(checkUploadStatus, 2000);
    </script>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        width: 100%;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        overflow: hidden;
    }

    .back-nav {
        position: absolute;
        top: 20px;
        left: 50px;
        z-index: 10;
    }

    .back-button {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: rgb(41, 40, 40);
        font-size: 20px;
        font-weight: 600;
        background: rgb(250, 248, 248);
        padding: 10px 20px;
        border-radius: 50px;
        border: 1px solid rgba(236, 230, 230, 0.2);
        transition: 0.3s;
    }

    .back-button:hover {
        background: rgba(255, 255, 255, 0.8);
        transform: translateX(-5px);
    }

    .back-button::before {
        content: "\2190";
        margin-right: 10px;
        font-size: 24px;
    }

    /* --- Main White Container --- */
    #print {
        background: rgba(255, 255, 255, 0.95); 
        border-radius: 20px;
        height: 85vh;
        width: 95%;
        display: flex;
        flex-direction: column; /* Mahalaga: Para mag-stack vertical ang stepper at qr */
        align-items: center;    /* Center horizontal lahat ng nasa loob */
        justify-content: flex-start; /* Simula sa taas ang salansan */
        padding: 50px 20px;     /* Padding sa lahat ng side */
        color: #333;
    }

    /* --- Stepper Design --- */
    .stepper-wrapper {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;
        max-width: 800px;
        position: relative;
        margin-bottom: 40px; /* Space sa ilalim ng stepper */
    }

    .stepper-wrapper::before {
        content: '';
        position: absolute;
        top: 25px;
        left: 50px;
        right: 50px;
        height: 2px;
        background: #ddd;
        z-index: 1;
    }

    .step-link {
        text-decoration: none;
        flex: 1;
        z-index: 2;
        transition: 0.3s;
    }

    .stepper-item {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .step-counter {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: #eee;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        margin-bottom: 10px;
        border: 2px solid #ccc;
        color: #888;
    }

    .step-name {
        font-size: 14px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
    }

    .stepper-item.active .step-counter {
        background: #203a43;
        color: white;
        border-color: #203a43;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .stepper-item.active .step-name {
        color: #203a43;
    }

    /* --- Upload / QR Section Center --- */
    .upload-content {
        flex: 1; /* Kakainin ang natitirang space */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; /* Perpektong center sa loob ng white box */
        width: 100%;
    }

    .qr-section img {
        width: 220px;
        padding: 15px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        margin: 25px 0;
        border: 1px solid #eee;
    }

    .qr-section h3 { 
        font-size: 35px; 
        color: #203a43; 
        font-weight: 800;
    }

    .qr-section p { 
        color: #666; 
        font-size: 18px; 
        max-width: 450px; 
        line-height: 1.5;
    }

    .status-section {
        margin-top: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #203a43;
        border-radius: 50%;
        width: 25px;
        height: 25px;
        animation: spin 1s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
