<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS - Employee Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        html, body { height: 100%; margin: 0; background-color: #f8f9fa !important; color: #333; font-family: 'Segoe UI', sans-serif; }
        .sidebar { min-height: 100vh; background-color: #2c3e50 !important; color: #ffffff !important; }
        .nav-link { color: rgba(255,255,255,0.7) !important; transition: all 0.3s ease; }
        .nav-link:hover { color: #ffffff !important; background: rgba(255, 255, 255, 0.1); border-radius: 5px; }
        .nav-link.active { color: white !important; background: #3b82f6 !important; border-radius: 5px; }
        .card { border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075) !important; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar p-3">
                <h4 class="text-center mb-4">EMS Admin</h4>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/employees"><i class="bi bi-people me-2"></i> Employees</a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-gear me-2"></i> Settings</a></li>
                    <hr>
                    <li class="nav-item"><a class="nav-link text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                </ul>
            </nav>

            <main class="col-md-10 ms-sm-auto p-4">
                <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Staff Management</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEmployeeModal"><i class="bi bi-plus-lg"></i> Add New Employee</button>
                </div>

                <div class="card p-4 shadow-sm border-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Position</th>
                                    <th>Department</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="employeeTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Employee Modal -->
    <div class="modal fade" id="addEmployeeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5>Add New Employee</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <form id="addEmployeeForm">
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Full Name</label><input type="text" name="name" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Position</label><input type="text" name="position" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Department</label><input type="text" name="department" class="form-control" required></div>
                    </div>
                    <div class="modal-footer"><button type="submit" class="btn btn-primary">Save Employee</button></div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Employee Modal -->
    <div class="modal fade" id="editEmployeeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5>Edit Employee</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <form id="editEmployeeForm">
                    <input type="hidden" name="id" id="editEmployeeId">
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Full Name</label><input type="text" name="name" id="editEmployeeName" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Position</label><input type="text" name="position" id="editEmployeePosition" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Department</label><input type="text" name="department" id="editEmployeeDepartment" class="form-control" required></div>
                    </div>
                    <div class="modal-footer"><button type="submit" class="btn btn-primary">Update Changes</button></div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const addModal = new bootstrap.Modal('#addEmployeeModal');
        const editModal = new bootstrap.Modal('#editEmployeeModal');

        function loadEmployees() {
            fetch('/api/employees')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('employeeTableBody');
                    tbody.innerHTML = data.map(emp => `
                        <tr>
                            <td>${emp.id}</td>
                            <td>${emp.name}</td>
                            <td>${emp.position}</td>
                            <td>${emp.department}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${emp.id}, '${emp.name}', '${emp.position}', '${emp.department}')"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteEmployee(${emp.id})"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                });
        }

        function openEditModal(id, name, position, department) {
            document.getElementById('editEmployeeId').value = id;
            document.getElementById('editEmployeeName').value = name;
            document.getElementById('editEmployeePosition').value = position;
            document.getElementById('editEmployeeDepartment').value = department;
            editModal.show();
        }

        function deleteEmployee(id) {
            if (confirm('Sigurado ka bang gusto mong tanggalin ang employee na ito?')) {
                fetch(`/api/employees/${id}`, { method: 'DELETE' }).then(() => loadEmployees());
            }
        }

        document.getElementById('addEmployeeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            fetch('/api/employees', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => { addModal.hide(); e.target.reset(); loadEmployees(); });
        });

        document.getElementById('editEmployeeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            fetch(`/api/employees/${data.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => { editModal.hide(); loadEmployees(); });
        });

        loadEmployees();
    </script>
</body>
</html>
