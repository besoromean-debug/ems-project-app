<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #212529; color: white; }
        .nav-link { color: rgba(255,255,255,.75); }
        .nav-link:hover { color: white; }
        .nav-link.active { color: white; background: #0d6efd; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar p-3">
                <h4 class="text-center mb-4">EMS Admin</h4>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item"><a class="nav-link active" href="#"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-people me-2"></i> Employees</a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-gear me-2"></i> Settings</a></li>
                    <hr>
                    <li class="nav-item"><a class="nav-link text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto p-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Admin Dashboard</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <span class="badge bg-primary p-2" id="userBadge">Loading...</span>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0">
                            <div class="card-body">
                                <h5 class="card-title text-muted">Total Employees</h5>
                                <h2 class="mb-0">24</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0">
                            <div class="card-body text-success">
                                <h5 class="card-title text-muted">Active Sessions</h5>
                                <h2 class="mb-0">3</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0">
                            <div class="card-body text-warning">
                                <h5 class="card-title text-muted">Pending Requests</h5>
                                <h2 class="mb-0">5</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5">
                    <h4>System Status</h4>
                    <div class="alert alert-info border-0 shadow-sm">
                        <i class="bi bi-shield-check me-2"></i> Naka-login ka na nang ligtas. Cyber Level 2 Security is active.
                        <i class="bi bi-shield-check me-2"></i> Securely logged in. Cyber Level 2 Security is active.
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Fetch user data from our new API endpoint
        fetch('/api/user')
            .then(res => res.json())
            .then(data => document.getElementById('userBadge').innerText = 'User: ' + data.username);
    </script>
</body>
</html>
